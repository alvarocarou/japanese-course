<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CosyVoice Reader</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
  <script src="metadata.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CosyVoice Reader</p>
        <h1 id="title">Audio</h1>
      </div>
      <div class="headerActions">
        <button id="themeButton" class="themeButton" type="button" aria-label="Cambiar modo nocturno">Night</button>
        <div id="counter" class="counter">0 / 0</div>
      </div>
    </header>

    <section class="reader" aria-label="Texto sincronizado">
      <div id="segments" class="segments"></div>
    </section>

    <footer class="player">
      <button id="backButton" type="button" aria-label="Segmento anterior">Prev</button>
      <audio id="audio" controls preload="metadata"></audio>
      <button id="nextButton" type="button" aria-label="Segmento siguiente">Next</button>
    </footer>
  </main>
</body>
</html>
